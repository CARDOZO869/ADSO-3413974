<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">

  <!-- Definiciones -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>

    <style>
      .title { font-family: Arial; font-size: 22px; font-weight: bold; fill:#333; }
      .main { fill:#1e88e5; rx:20; }
      .sub { fill:#42a5f5; rx:15; }
      .leaf { fill:#90caf9; rx:10; }
      .text { font-family: Arial; font-size: 13px; fill:white; text-anchor:middle; }
      .line { stroke:#555; stroke-width:2; marker-end:url(#arrow); }
    </style>
  </defs>

  <!-- Fondo -->
  <rect width="100%" height="100%" fill="#f5f7fa"/>

  <!-- Título -->
  <text x="500" y="40" text-anchor="middle" class="title">
    Mapa Conceptual: Instrumentos de Recolección de Datos
  </text>

  <!-- Nodo central -->
  <rect x="350" y="80" width="300" height="70" class="main"/>
  <text x="500" y="115" class="text">Instrumentos de</text>
  <text x="500" y="135" class="text">Recolección de Datos</text>

  <!-- Nivel 1 -->
  <rect x="100" y="220" width="180" height="60" class="sub"/>
  <text x="190" y="255" class="text">Tipos</text>

  <rect x="410" y="220" width="180" height="60" class="sub"/>
  <text x="500" y="255" class="text">Características</text>

  <rect x="720" y="220" width="180" height="60" class="sub"/>
  <text x="810" y="255" class="text">Proceso</text>

  <!-- Nivel 2 - Tipos -->
  <rect x="60" y="340" width="120" height="50" class="leaf"/>
  <text x="120" y="370" class="text">Encuesta</text>

  <rect x="190" y="340" width="120" height="50" class="leaf"/>
  <text x="250" y="370" class="text">Entrevista</text>

  <rect x="60" y="410" width="120" height="50" class="leaf"/>
  <text x="120" y="440" class="text">Observación</text>

  <rect x="190" y="410" width="120" height="50" class="leaf"/>
  <text x="250" y="440" class="text">Grupo Focal</text>

  <!-- Nivel 2 - Características -->
  <rect x="380" y="340" width="120" height="50" class="leaf"/>
  <text x="440" y="370" class="text">Validez</text>

  <rect x="520" y="340" width="120" height="50" class="leaf"/>
  <text x="580" y="370" class="text">Confiabilidad</text>

  <rect x="380" y="410" width="120" height="50" class="leaf"/>
  <text x="440" y="440" class="text">Objetividad</text>

  <rect x="520" y="410" width="120" height="50" class="leaf"/>
  <text x="580" y="440" class="text">Precisión</text>

  <!-- Nivel 2 - Proceso -->
  <rect x="700" y="340" width="120" height="50" class="leaf"/>
  <text x="760" y="370" class="text">Diseño</text>

  <rect x="840" y="340" width="120" height="50" class="leaf"/>
  <text x="900" y="370" class="text">Validación</text>

  <rect x="700" y="410" width="120" height="50" class="leaf"/>
  <text x="760" y="440" class="text">Aplicación</text>

  <rect x="840" y="410" width="120" height="50" class="leaf"/>
  <text x="900" y="440" class="text">Análisis</text>

  <!-- Conexiones -->
  <line x1="500" y1="150" x2="190" y2="220" class="line"/>
  <line x1="500" y1="150" x2="500" y2="220" class="line"/>
  <line x1="500" y1="150" x2="810" y2="220" class="line"/>

  <!-- Tipos -->
  <line x1="190" y1="280" x2="120" y2="340" class="line"/>
  <line x1="190" y1="280" x2="250" y2="340" class="line"/>
  <line x1="190" y1="280" x2="120" y2="410" class="line"/>
  <line x1="190" y1="280" x2="250" y2="410" class="line"/>

  <!-- Características -->
  <line x1="500" y1="280" x2="440" y2="340" class="line"/>
  <line x1="500" y1="280" x2="580" y2="340" class="line"/>
  <line x1="500" y1="280" x2="440" y2="410" class="line"/>
  <line x1="500" y1="280" x2="580" y2="410" class="line"/>

  <!-- Proceso -->
  <line x1="810" y1="280" x2="760" y2="340" class="line"/>
  <line x1="810" y1="280" x2="900" y2="340" class="line"/>
  <line x1="810" y1="280" x2="760" y2="410" class="line"/>
  <line x1="810" y1="280" x2="900" y2="410" class="line"/>

</svg>
