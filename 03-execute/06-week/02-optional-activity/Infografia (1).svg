<svg width="1000" height="550" xmlns="http://www.w3.org/2000/svg">

  <!-- Definiciones -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43a047;stop-opacity:1" />
    </linearGradient>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="100%" height="100%" fill="#f4f6f8"/>

  <!-- Título -->
  <text x="500" y="40" text-anchor="middle" font-size="22" font-family="Arial" fill="#333" font-weight="bold">
    Proceso de Recolección de Datos
  </text>

  <!-- Cajas superiores -->
  <rect x="80" y="120" width="160" height="70" rx="15" fill="url(#grad1)"/>
  <text x="160" y="160" text-anchor="middle" fill="white" font-size="14">Inicio</text>

  <rect x="270" y="120" width="180" height="70" rx="15" fill="url(#grad1)"/>
  <text x="360" y="155" text-anchor="middle" fill="white" font-size="13">Definir Objetivo</text>
  <text x="360" y="175" text-anchor="middle" fill="white" font-size="13">de Investigación</text>

  <rect x="480" y="120" width="180" height="70" rx="15" fill="url(#grad1)"/>
  <text x="570" y="155" text-anchor="middle" fill="white" font-size="13">Identificar</text>
  <text x="570" y="175" text-anchor="middle" fill="white" font-size="13">Variables</text>

  <rect x="690" y="120" width="200" height="70" rx="15" fill="url(#grad1)"/>
  <text x="790" y="155" text-anchor="middle" fill="white" font-size="13">Seleccionar</text>
  <text x="790" y="175" text-anchor="middle" fill="white" font-size="13">Instrumento</text>

  <!-- Cajas inferiores -->
  <rect x="690" y="250" width="200" height="70" rx="15" fill="url(#grad2)"/>
  <text x="790" y="285" text-anchor="middle" fill="white" font-size="13">Diseñar</text>
  <text x="790" y="305" text-anchor="middle" fill="white" font-size="13">Instrumento</text>

  <rect x="480" y="250" width="180" height="70" rx="15" fill="url(#grad2)"/>
  <text x="570" y="290" text-anchor="middle" fill="white" font-size="13">Validar</text>

  <rect x="270" y="250" width="180" height="70" rx="15" fill="url(#grad2)"/>
  <text x="360" y="290" text-anchor="middle" fill="white" font-size="13">Prueba Piloto</text>

  <rect x="80" y="250" width="160" height="70" rx="15" fill="url(#grad2)"/>
  <text x="160" y="290" text-anchor="middle" fill="white" font-size="13">Ajustes</text>

  <!-- Final -->
  <rect x="400" y="380" width="220" height="80" rx="20" fill="#ff7043"/>
  <text x="510" y="420" text-anchor="middle" fill="white" font-size="15" font-weight="bold">
    Aplicación Final
  </text>

  <!-- Flechas -->
  <line x1="240" y1="155" x2="270" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="155" x2="480" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="155" x2="690" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="790" y1="190" x2="790" y2="250" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="690" y1="285" x2="660" y2="285" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="285" x2="450" y2="285" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="270" y1="285" x2="240" y2="285" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="160" y1="320" x2="510" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

</svg>
